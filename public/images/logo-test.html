<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로고 확인 — 포에버 명동의원</title>
<style>
  body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
  .section { background: white; padding: 32px; margin-bottom: 24px; border-radius: 8px; }
  h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 20px; }
  .row { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box label { font-size: 12px; color: #aaa; }
  .bg-white { background: white; padding: 20px; border: 1px solid #eee; border-radius: 4px; }
  .bg-dark { background: #1a1a1a; padding: 20px; border-radius: 4px; }
  .bg-cream { background: #faf6f1; padding: 20px; border-radius: 4px; }
</style>
</head>
<body>
<h1 style="font-size:18px;margin-bottom:32px;">로고 확인 — 포에버 명동의원 최종본</h1>

<div class="section">
  <h2>logo-horizontal.svg — 클로버 + 4EVER (헤더용)</h2>
  <div class="row">
    <div class="box">
      <div class="bg-white"><img src="logo-horizontal.svg" height="50" alt="logo-horizontal"></div>
      <label>흰 배경</label>
    </div>
    <div class="box">
      <div class="bg-dark"><img src="logo-horizontal.svg" height="50" alt="logo-horizontal"></div>
      <label>어두운 배경</label>
    </div>
    <div class="box">
      <div class="bg-cream"><img src="logo-horizontal.svg" height="50" alt="logo-horizontal"></div>
      <label>크림 배경</label>
    </div>
    <div class="box">
      <div class="bg-white"><img src="logo-horizontal.svg" height="80" alt="logo-horizontal"></div>
      <label>80px</label>
    </div>
    <div class="box">
      <div class="bg-white"><img src="logo-horizontal.svg" height="32" alt="logo-horizontal"></div>
      <label>32px (모바일)</label>
    </div>
  </div>
</div>

<div class="section">
  <h2>logo-vertical.svg — 풀네임 (4EVER + FOREVER CLINIC)</h2>
  <div class="row">
    <div class="box">
      <div class="bg-white"><img src="logo-vertical.svg" height="80" alt="logo-vertical"></div>
      <label>흰 배경</label>
    </div>
    <div class="box">
      <div class="bg-dark"><img src="logo-vertical.svg" height="80" alt="logo-vertical"></div>
      <label>어두운 배경</label>
    </div>
    <div class="box">
      <div class="bg-cream"><img src="logo-vertical.svg" height="80" alt="logo-vertical"></div>
      <label>크림 배경</label>
    </div>
  </div>
</div>

<div class="section">
  <h2>logo-icon.svg — 클로버 심볼 단독</h2>
  <div class="row">
    <div class="box">
      <div class="bg-white"><img src="logo-icon.svg" height="48" alt="logo-icon"></div>
      <label>48px</label>
    </div>
    <div class="box">
      <div class="bg-dark"><img src="logo-icon.svg" height="48" alt="logo-icon"></div>
      <label>다크</label>
    </div>
    <div class="box">
      <div class="bg-white"><img src="logo-icon.svg" height="32" alt="logo-icon"></div>
      <label>32px</label>
    </div>
    <div class="box">
      <div class="bg-white"><img src="logo-icon.svg" height="16" alt="logo-icon"></div>
      <label>16px (파비콘)</label>
    </div>
  </div>
</div>
</body>
</html>
